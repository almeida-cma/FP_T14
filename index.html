<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python - TEMA 14: Funções e Módulos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 550px;
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 2em;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #ccc;
            margin-bottom: 40px;
            font-size: 0.95em;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn {
            display: block;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.05em;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: #ffd700;
            color: #1a1a2e;
            border: 2px solid #ffd700;
        }

        .btn-primary:hover {
            background: #ffed4a;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border: 2px solid #ffd700;
        }

        .btn-secondary:hover {
            background: rgba(255, 215, 0, 0.25);
            transform: scale(1.02);
        }

        .footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .footer a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85em;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #ffd700;
        }

        .emoji {
            font-size: 1.1em;
            margin-right: 8px;
        }

        .info {
            margin-top: 20px;
            font-size: 0.75em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 TEMA 14</h1>
        <div class="subtitle">Funções e Módulos</div>

        <div class="links">
            <a href="tema14.html" class="btn btn-primary" target="_blank">
                <span class="emoji">📖</span> Tema 14 - Funções e Módulos
            </a>
            <a href="atividades.pdf" class="btn btn-secondary" target="_blank">
                <span class="emoji">📝</span> Atividades (PDF)
            </a>
        </div>

        <div class="footer">
            <a href="https://forms.gle/QvYjXnrAenbMSyTR8" target="_blank">
                <span class="emoji">🆘</span> Solicitar suporte
            </a>
            <a href="https://forms.gle/T9QSe3PyEpru3t538" target="_blank">
                <span class="emoji">📤</span> Enviar atividades
            </a>
        </div>

        <div class="info">
            <p>📦 Repositório: <strong>python-14</strong> | Funções e Módulos</p>
            <p>✅ Material: Tema 14 + Atividades em PDF</p>
        </div>
    </div>
</body>
</html>
